<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MYKO">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BEFAFF"/>
      <stop offset="45%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#005C66"/>
    </radialGradient>
    <linearGradient id="filament" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00F0FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- deep field -->
  <rect width="512" height="512" fill="#07090C"/>

  <!-- outer halo -->
  <circle cx="256" cy="256" r="230" fill="url(#halo)"/>

  <!-- hex lattice (mycelial vessel) -->
  <g transform="translate(256 256)" fill="none" stroke="#00F0FF" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#glow)">
    <polygon points="0,-170 147,-85 147,85 0,170 -147,85 -147,-85" stroke-width="3" opacity="0.55"/>
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- radiating filaments with nodal beads -->
  <g transform="translate(256 256)" stroke="#00F0FF" stroke-linecap="round" fill="#00F0FF" filter="url(#glow)">
    <!-- 12 primary filaments at 30deg -->
    <g opacity="0.9">
      <line x1="0" y1="0" x2="0" y2="-210" stroke-width="2"/>
      <line x1="0" y1="0" x2="105" y2="-182" stroke-width="2"/>
      <line x1="0" y1="0" x2="182" y2="-105" stroke-width="2"/>
      <line x1="0" y1="0" x2="210" y2="0" stroke-width="2"/>
      <line x1="0" y1="0" x2="182" y2="105" stroke-width="2"/>
      <line x1="0" y1="0" x2="105" y2="182" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="210" stroke-width="2"/>
      <line x1="0" y1="0" x2="-105" y2="182" stroke-width="2"/>
      <line x1="0" y1="0" x2="-182" y2="105" stroke-width="2"/>
      <line x1="0" y1="0" x2="-210" y2="0" stroke-width="2"/>
      <line x1="0" y1="0" x2="-182" y2="-105" stroke-width="2"/>
      <line x1="0" y1="0" x2="-105" y2="-182" stroke-width="2"/>
    </g>

    <!-- tip beads -->
    <g>
      <circle cx="0" cy="-210" r="5"/>
      <circle cx="105" cy="-182" r="4"/>
      <circle cx="182" cy="-105" r="5"/>
      <circle cx="210" cy="0" r="4"/>
      <circle cx="182" cy="105" r="5"/>
      <circle cx="105" cy="182" r="4"/>
      <circle cx="0" cy="210" r="5"/>
      <circle cx="-105" cy="182" r="4"/>
      <circle cx="-182" cy="105" r="5"/>
      <circle cx="-210" cy="0" r="4"/>
      <circle cx="-182" cy="-105" r="5"/>
      <circle cx="-105" cy="-182" r="4"/>
    </g>

    <!-- secondary branching filaments (organic asymmetric) -->
    <g opacity="0.55" fill="none" stroke-width="1.2">
      <path d="M 0 -120 Q 30 -150 0 -210"/>
      <path d="M 104 -60 Q 150 -100 182 -105"/>
      <path d="M 104 60 Q 160 80 210 0"/>
      <path d="M 0 120 Q -30 150 0 210"/>
      <path d="M -104 60 Q -150 100 -182 105"/>
      <path d="M -104 -60 Q -160 -80 -210 0"/>
      <path d="M 40 -30 Q 80 -10 120 -20"/>
      <path d="M -40 30 Q -80 10 -120 20"/>
      <path d="M 30 40 Q 10 80 -20 120"/>
      <path d="M -30 -40 Q -10 -80 20 -120"/>
    </g>
  </g>

  <!-- luminous core -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <circle r="42" fill="url(#core)"/>
    <circle r="20" fill="#E8FDFF" opacity="0.9"/>
    <circle r="8"  fill="#FFFFFF"/>
  </g>
</svg>
