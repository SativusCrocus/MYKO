<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="MYKO — Sovereign Life OS">
  <defs>
    <radialGradient id="core2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#BEFAFF"/>
      <stop offset="45%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#005C66"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00F0FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00F0FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8FDFF"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="#07090C"/>

  <!-- mark -->
  <g transform="translate(140 140)">
    <circle r="130" fill="url(#halo2)"/>
    <g fill="none" stroke="#00F0FF" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)">
      <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke-width="2.2" opacity="0.55"/>
      <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35" stroke-width="1.6" opacity="0.35"/>
    </g>
    <g stroke="#00F0FF" stroke-linecap="round" fill="#00F0FF" filter="url(#glow2)" opacity="0.9">
      <line x1="0" y1="0" x2="0" y2="-118" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="59" y2="-102" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="102" y2="-59" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="118" y2="0" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="102" y2="59" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="59" y2="102" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="0" y2="118" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-59" y2="102" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-102" y2="59" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-118" y2="0" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-102" y2="-59" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-59" y2="-102" stroke-width="1.6"/>
      <circle cx="0"    cy="-118" r="3.2"/>
      <circle cx="59"   cy="-102" r="2.6"/>
      <circle cx="102"  cy="-59"  r="3.2"/>
      <circle cx="118"  cy="0"    r="2.6"/>
      <circle cx="102"  cy="59"   r="3.2"/>
      <circle cx="59"   cy="102"  r="2.6"/>
      <circle cx="0"    cy="118"  r="3.2"/>
      <circle cx="-59"  cy="102"  r="2.6"/>
      <circle cx="-102" cy="59"   r="3.2"/>
      <circle cx="-118" cy="0"    r="2.6"/>
      <circle cx="-102" cy="-59"  r="3.2"/>
      <circle cx="-59"  cy="-102" r="2.6"/>
    </g>
    <g filter="url(#glow2)">
      <circle r="26" fill="url(#core2)"/>
      <circle r="12" fill="#E8FDFF" opacity="0.9"/>
      <circle r="5"  fill="#FFFFFF"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace" fill="url(#wordFill)">
    <text x="305" y="160" font-size="118" font-weight="700" letter-spacing="18" filter="url(#glow2)">MYKO</text>
    <text x="308" y="205" font-size="22" font-weight="500" letter-spacing="8" fill="#7EE8F2" opacity="0.85">SOVEREIGN · LIFE · OS</text>
  </g>
</svg>
