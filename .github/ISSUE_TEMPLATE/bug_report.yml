name: Bug report
description: Something MYKO does that it shouldn't (or doesn't that it should).
title: "[bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not** include
        passphrases, macaroons, npubs, nsec, BOLT11 invoices, payment hashes,
        or any other secret material in this report.

        For security vulnerabilities, do not open this issue — see
        [`SECURITY.md`](https://github.com/SativusCrocus/MYKO/blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to trigger it. The more deterministic, the better.
      placeholder: |
        1. Run `python -m backend.bridge`
        2. Call `vault_store` with payload …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Stack traces are welcome. Redact paths and tokens.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MYKO version / commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.x or 3.13.x"

  - type: input
    id: kubo
    attributes:
      label: Kubo / IPFS version
      placeholder: "ipfs version --number"

  - type: dropdown
    id: lightning
    attributes:
      label: Lightning backend
      options:
        - LND
        - LNbits
        - None
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: From `~/MYKO/logs/` or stdout. Redact aggressively.
      render: shell
